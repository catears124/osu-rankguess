name: verify gallery popup production

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Verify Discord metadata
        shell: bash
        run: |
          set -euo pipefail
          page='https://www.osurankguess.com/gallery?replay=97a8d21c13676028454fbe45'

          curl --fail-with-body --show-error --silent --location \
            --user-agent 'Discordbot/2.0' \
            --output /tmp/discord.html \
            "$page"
          grep -F '<meta property="og:title" content="M_1kS"' /tmp/discord.html
          grep -F '<meta property="og:description" content="TRUE – Soundscape [Melody] · 6.76★ · NM · 97.80% accuracy · Can you guess their rank?"' /tmp/discord.html
          grep -F '<meta property="og:video"' /tmp/discord.html

      - name: Install browser
        run: |
          python -m pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Verify popup behavior
        run: |
          python - <<'PY'
          from playwright.sync_api import sync_playwright

          canonical = "https://www.osurankguess.com/gallery?replay=97a8d21c13676028454fbe45"
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page(viewport={"width": 1440, "height": 1000})
              page.goto(canonical, wait_until="domcontentloaded", timeout=60_000)
              page.wait_for_selector("#galleryDialog[open]", timeout=60_000)
              assert page.locator("body").get_attribute("data-view") == "gallery"
              assert page.locator("#galleryDialogBody video").count() == 1
              assert "mystery replay" in page.locator("#galleryDialogBody").inner_text().lower()
              assert page.url == canonical
              browser.close()
          PY
