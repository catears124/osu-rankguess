name: gallery and daily cron

on:
  push:
    branches:
      - main
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rankguess-background-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Allow production deployment to settle
        if: github.event_name == 'push'
        shell: bash
        run: sleep 35

      - name: Trigger resumable gallery ingestion
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://osu-rankguess.vercel.app
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CRON_SECRET}" ]]; then
            echo "::error::Repository secret CRON_SECRET is missing. Set it to the same value used by Vercel."
            exit 1
          fi

          response_file="$(mktemp)"
          trap 'rm -f "${response_file}"' EXIT

          http_code="$(curl \
            --show-error \
            --silent \
            --retry 2 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 230 \
            --output "${response_file}" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Accept: application/json" \
            --header "User-Agent: osu-rankguess-cron/${GITHUB_RUN_ID}" \
            "${SITE_URL}/api/cron/tick")"

          cat "${response_file}"
          echo

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            echo "::error::Cron endpoint returned HTTP ${http_code}."
            exit 1
          fi
