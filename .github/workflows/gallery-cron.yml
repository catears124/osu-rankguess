name: gallery and daily cron

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rankguess-background-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger randomized gallery ingestion
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: https://osu-rankguess.vercel.app
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CRON_SECRET}" ]]; then
            echo "::error::Repository secret CRON_SECRET is missing. Set it to the same value used by Vercel."
            exit 1
          fi

          curl \
            --fail-with-body \
            --show-error \
            --silent \
            --retry 2 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 230 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Accept: application/json" \
            "${SITE_URL}/api/cron/tick"
