name: default browser theme

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove forced browser theme from all four snapshots
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "catears124"
          git config user.email "72218235+catears124@users.noreply.github.com"

          original_tip="de4daece5c1643920aae9b2cc65e40a9e2649767"
          mapfile -t commits < <(git rev-list --reverse "$original_tip")
          test "${#commits[@]}" -eq 4

          git checkout --orphan theme-history-ready
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx

          for index in "${!commits[@]}"; do
            old="${commits[$index]}"
            git checkout "$old" -- .
            rm -rf .github/workflows

            if [ -f public/index.html ]; then
              python - <<'PY'
from pathlib import Path
path = Path("public/index.html")
text = path.read_text(encoding="utf-8")
lines = [
    line for line in text.splitlines()
    if 'name="theme-color"' not in line
    and 'name="color-scheme"' not in line
]
path.write_text("\n".join(lines) + "\n", encoding="utf-8")
PY
            fi

            git add -A
            export GIT_AUTHOR_NAME="$(git show -s --format=%an "$old")"
            export GIT_AUTHOR_EMAIL="$(git show -s --format=%ae "$old")"
            export GIT_AUTHOR_DATE="$(git show -s --format=%aI "$old")"
            export GIT_COMMITTER_NAME="$(git show -s --format=%cn "$old")"
            export GIT_COMMITTER_EMAIL="$(git show -s --format=%ce "$old")"
            export GIT_COMMITTER_DATE="$(git show -s --format=%cI "$old")"
            git commit -m "$(git show -s --format=%B "$old")"

            if [ "$index" -lt 3 ]; then
              git rm -rf . >/dev/null 2>&1 || true
              git clean -fdx
            fi
          done

          test "$(git rev-list --count HEAD)" -eq 4
          test ! -e .github/workflows/default-browser-theme.yml
          ! grep -R 'name="theme-color"\|name="color-scheme"' public/index.html
          git push --force origin HEAD:refs/heads/theme-history-ready
